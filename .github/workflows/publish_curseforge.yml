name: Publish to CurseForge

on:
  workflow_run:
    workflows: ["Build NeoForge Mod"]
    types:
      - completed

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
      CF_PROJECT_ID: 1256129
      TAGS: "Java 21|Server|Client|NeoForge"

    steps:
      - name: Checkout CI branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Install jq
        run: |
          if ! command -v jq >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends jq
          fi

      # –°–±–æ—Ä–∫–∞ –º–æ–¥–∞ –ø—Ä—è–º–æ –≤ CD
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mod
        run: ./gradlew clean build
          
      - name: Determine JAR, version and release type
        run: |
          JAR_FILE=$(
            ls ./build/libs/*.jar 2>/dev/null \
            | grep -Ev '(sources|javadoc|dev)' \
            | sort -V \
            | tail -n1
          )
          if [ -z "$JAR_FILE" ]; then
            echo "JAR file not found!"
            exit 1
          fi

          FILENAME=$(basename "$JAR_FILE")
          echo "FILENAME=$FILENAME" >> "$GITHUB_ENV"
          GAME_VERSION=$(echo "$FILENAME" | cut -d'-' -f2)
          VERSION_PART=$(echo "$FILENAME" | sed -E 's/^[^-]*-[^-]*-(.*)\.jar$/\1/')

          if [[ "$VERSION_PART" =~ ^(.+?)(-(beta|alpha))?$ ]]; then
            MOD_VERSION="${BASH_REMATCH[1]}"
            SUFFIX="${BASH_REMATCH[2]:-}"           # -beta, -alpha –∏–ª–∏ –ø—É—Å—Ç–æ
          else
            echo "Cannot parse version from filename: $FILENAME"
            exit 1
          fi

          # –ê –¥–∞–ª—å—à–µ case —Ç–æ–ª—å–∫–æ –¥–ª—è –∏–∑–≤–µ—Å—Ç–Ω—ã—Ö, –æ—Å—Ç–∞–ª—å–Ω—ã–µ ‚Üí skip
          case "$SUFFIX" in
            "")     RELEASE_TYPE="release" ; SUFFIX_FOR_VERSION="" ;;
            "-beta") RELEASE_TYPE="beta"   ; SUFFIX_FOR_VERSION="-beta" ;;
            "-alpha") RELEASE_TYPE="alpha" ; SUFFIX_FOR_VERSION="-alpha" ;;
            *)
              echo "Unknown suffix '$SUFFIX' in $FILENAME ‚Äî skipping publish"
              echo "PUBLISH=false" >> $GITHUB_ENV
              exit 0
              ;;
          esac
          
          echo "GAME_VERSION=$GAME_VERSION" >> $GITHUB_ENV
          echo "MOD_VERSION=$MOD_VERSION" >> $GITHUB_ENV
          echo "RELEASE_TYPE=$RELEASE_TYPE" >> $GITHUB_ENV
          echo "FULL_VERSION=${MOD_VERSION}${SUFFIX_FOR_VERSION}" >> $GITHUB_ENV
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "PUBLISH=true" >> $GITHUB_ENV  # –ø–æ —É–º–æ–ª—á–∞–Ω–∏—é true, –¥–∞–ª—å—à–µ –ø—Ä–æ–≤–µ—Ä–∏–º
          
      - name: Prepare tags array
        if: env.PUBLISH == 'true'
        run: |
          # —Ä–∞–∑–±–∏–≤–∞–µ–º env.TAGS –ø–æ |
          IFS='|' read -r -a TAG_ARRAY <<< "$TAGS"
          # –¥–æ–±–∞–≤–ª—è–µ–º –≤–µ—Ä—Å–∏—é –∏–≥—Ä—ã –≤ –Ω–∞—á–∞–ª–æ –º–∞—Å—Å–∏–≤–∞
          TAG_ARRAY=("$GAME_VERSION" "${TAG_ARRAY[@]}")
          echo "TAG_ARRAY=${TAG_ARRAY[*]}" >> $GITHUB_ENV
          echo "All tags to process: ${TAG_ARRAY[@]}"

      - name: Get all version IDs
        if: env.PUBLISH == 'true'
        run: |
          source $GITHUB_ENV

          # –ø–æ–ª—É—á–∞–µ–º –ø–æ–ª–Ω—ã–π —Å–ø–∏—Å–æ–∫ –≤–µ—Ä—Å–∏–π –∏–∑ CurseForge API
          RESPONSE=$(curl -s -X GET https://minecraft.curseforge.com/api/game/versions \
            -H "Accept: application/json" \
            -H "X-Api-Token: ${{ secrets.CURSEFORGE_TOKEN }}" \
            -H "User-Agent: GitHub-Actions"
          )

          echo "$RESPONSE" > response.json

          # —Å–æ–∑–¥–∞—ë–º –º–∞—Å—Å–∏–≤ ID
          GAME_VERSION_IDS=()

          for TAG in "${TAG_ARRAY[@]}"; do
            ID=$(jq -r --arg t "$TAG" '
              .[] | select(.name == $t or .slug == ($t | gsub("[ .]";"-"))) | .id // empty
            ' response.json | head -n1)
            
            if [ -z "$ID" ]; then
              echo "ID for tag '$TAG' not found!"
            else
              GAME_VERSION_IDS+=("$ID")
              echo "Found ID $ID for tag '$TAG'"
            fi
          done

          # —Ñ–æ—Ä–º–∏—Ä—É–µ–º JSON-–º–∞—Å—Å–∏–≤ –¥–ª—è metadata
          GAME_VERSION_IDS_JSON=$(printf '%s\n' "${GAME_VERSION_IDS[@]}" | jq -s -c 'map(tonumber)')
          echo "GAME_VERSION_IDS_JSON=$GAME_VERSION_IDS_JSON" >> $GITHUB_ENV
          echo "All version IDs: $GAME_VERSION_IDS_JSON"

      - name: Check if version already exists on CurseForge
        if: env.PUBLISH == 'true'
        run: |
          source $GITHUB_ENV

          EXISTS=""

          for TAG in "${TAG_ARRAY[@]}"; do
            echo "--------------------------------------"
            echo "Checking version $FULL_VERSION for game version '$TAG'..."
            
            if [ -z "$TAG" ]; then
              echo "[!] Empty TAG, skipping..."
              continue
            fi

            RESPONSE=$(curl -s -w "%{http_code}" -H "X-Api-Token: ${{ secrets.CURSEFORGE_TOKEN }}" \
              "https://api.curseforge.com/v1/mods/$CF_PROJECT_ID/files?gameVersion=$TAG")
            
            HTTP_CODE="${RESPONSE: -3}"
            BODY="${RESPONSE::-3}"

            echo "HTTP code: $HTTP_CODE"
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "[!] Curl returned $HTTP_CODE for tag '$TAG'"
              echo "$BODY"
              continue
            fi

            # –ø—Ä–æ–≤–µ—Ä—è–µ–º JSON
            if ! echo "$BODY" | jq empty >/dev/null 2>&1; then
              echo "[!] Invalid JSON for tag '$TAG'"
              echo "$BODY"
              continue
            fi

            EXISTS=$(echo "$BODY" | jq -r --arg disp "$FULL_VERSION" \
                     '.data[]? | select(.displayName == $disp) | .id // empty')

            if [ -n "$EXISTS" ]; then
              echo "[!] Version $FULL_VERSION for '$TAG' already exists ‚Üí skipping publishing"
              echo "PUBLISH=false" >> $GITHUB_ENV
              break
            else
              FILE_COUNT=$(echo "$BODY" | jq '.data | length')
              echo "[+] Version $FULL_VERSION for '$TAG' not found ‚Üí OK to publish"
              echo "    Found $FILE_COUNT files for tag '$TAG'"
            fi
          done

      - name: Read changelog section
        if: env.PUBLISH == 'true'
        run: |
          if [ -f changelog.md ]; then
            {
              echo "CHANGELOG<<EOF"
              awk '/^## üì¶ Version /{if(!f){f=1;next}} f{print}' changelog.md | sed '/^## üì¶/,$d'
              echo "EOF"
            } >> $GITHUB_ENV
          else
            echo "CHANGELOG=No changelog provided" >> $GITHUB_ENV
          fi

      - name: Publish to CurseForge
        if: env.PUBLISH == 'true'
        run: |
          METADATA=$(jq -nc \
            --arg changelog "$CHANGELOG" \
            --arg changelogType "markdown" \
            --arg displayName "$FILENAME" \
            --arg releaseType "$RELEASE_TYPE" \
            --argjson gameVersions "$GAME_VERSION_IDS_JSON" \
            '{
              changelog: $changelog,
              changelogType: $changelogType,
              displayName: $displayName,
              releaseType: $releaseType,
              gameVersions: $gameVersions,
              isMarkedForManualRelease: true
            }' | jq -c .) # -c –¥–µ–ª–∞–µ—Ç JSON –≤ –æ–¥–Ω—É —Å—Ç—Ä–æ–∫—É
            
          echo "=== METADATA preview ==="
          echo "$METADATA"
          echo "======================="

          curl -X POST "https://minecraft.curseforge.com/api/projects/$CF_PROJECT_ID/upload-file" \
            -H "X-Api-Token: $CURSEFORGE_TOKEN" \
            -F "metadata=$METADATA" \
            -F "file=@$JAR_FILE" \
            --fail-with-body \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors

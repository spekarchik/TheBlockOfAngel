name: Publish to Modrinth

on:
  workflow_run:
    workflows: ["Build NeoForge Mod"]
    types:
      - completed

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      MODRINTH_PROJECT_ID: 7X4T4qK0
      MOD_LOADER: neoforge
    steps:
      - name: Checkout CI branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          
      - name: Install jq
        run: |
          if ! command -v jq >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends jq
          fi

      # Сборка мода прямо в CD
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build mod
        run: ./gradlew clean build

      - name: Determine JAR, version and release type
        run: |
          JAR_FILE=$(
            ls ./build/libs/*.jar 2>/dev/null \
            | grep -Ev '(sources|javadoc)' \
            | sort -V \
            | tail -n1
          )
          if [ -z "$JAR_FILE" ]; then
            echo "JAR file not found!"
            exit 1
          fi

          FILENAME=$(basename "$JAR_FILE")

          # Формат: <modid>-<game_version>-<mod_version>[-beta|-alpha].jar
          # Примеры:
          # mymod-1.21.1-2.14.7.jar
          # mymod-1.20.1-2.14.7-beta.jar
          # mymod-1.21.3-1.0.0-alpha.jar

          # 1. game version — второй кусок
          GAME_VERSION=$(echo "$FILENAME" | cut -d'-' -f2)

          # 2. Всё после второго - и до последнего .
          #    Затем убираем возможные -beta / -alpha в конце
          VERSION_PART=$(echo "$FILENAME" | sed -E 's/^[^-]*-[^-]*-(.*)\.jar$/\1/')

          # 3. Определяем суффикс и чистую версию мода
          if [[ "$VERSION_PART" =~ ^(.+?)(-(beta|alpha))?$ ]]; then
            MOD_VERSION="${BASH_REMATCH[1]}"
            SUFFIX="${BASH_REMATCH[2]:-}"           # -beta, -alpha или пусто
          else
            echo "Cannot parse version from filename: $FILENAME"
            exit 1
          fi

          # 4. Определяем release type и суффикс для version_number
          case "$SUFFIX" in
            "")     
              RELEASE_TYPE="release"
              SUFFIX_FOR_VERSION=""
              ;;
            "-beta") 
              RELEASE_TYPE="beta"
              SUFFIX_FOR_VERSION="-beta"
              ;;
            "-alpha")
              RELEASE_TYPE="alpha"
              SUFFIX_FOR_VERSION="-alpha"
              ;;
            *)
              echo "Unknown version suffix '$SUFFIX' in $FILENAME → skipping publish"
              echo "PUBLISH=false" >> $GITHUB_ENV
              exit 0
              ;;
          esac

          # Записываем в окружение
          echo "GAME_VERSION=$GAME_VERSION" >> $GITHUB_ENV
          echo "MOD_VERSION=$MOD_VERSION" >> $GITHUB_ENV
          echo "RELEASE_TYPE=$RELEASE_TYPE" >> $GITHUB_ENV
          echo "DISPLAY_NAME=${MOD_VERSION}${SUFFIX_FOR_VERSION}" >> $GITHUB_ENV
          echo "FULL_VERSION=${GAME_VERSION}-${MOD_VERSION}${SUFFIX_FOR_VERSION}" >> $GITHUB_ENV
          echo "JAR_FILE=$JAR_FILE" >> $GITHUB_ENV
          echo "PUBLISH=true" >> $GITHUB_ENV  # по умолчанию true, дальше проверим

      - name: Check if version already exists on Modrinth
        if: env.PUBLISH == 'true'
        run: |
          DATA=$(curl -s -H "Authorization: $MODRINTH_TOKEN" \
            "https://api.modrinth.com/v2/project/$MODRINTH_PROJECT_ID/version")
          
          # Проверка, что DATA не пустой и начинается с '['
          if [[ -z "$DATA" ]] || [[ ! "$DATA" =~ ^\[ ]]; then
            echo "Failed to fetch versions or invalid JSON:"
            echo "$DATA"
            echo "Assuming version does not exist → will publish"
            echo "PUBLISH=true" >> $GITHUB_ENV
            exit 0
          fi

          #echo "Fetched versions data:"
          #echo "$DATA" | jq -r '.[] | "ID: \(.id), Version: \(.version_number), Game Versions: \(.game_versions), Loaders: \(.loaders)"'

          EXISTS=$(echo "$DATA" | jq -r \
            --arg ver "$FULL_VERSION" \
            --arg gv "$GAME_VERSION" \
            --arg ml "$MOD_LOADER" \
            '.[] | select(.version_number == $ver)
                  | select(.game_versions | index($gv))
                  | select(.loaders | index($ml))
                  | .id')

          if [ -n "$EXISTS" ]; then
            echo "Version $FULL_VERSION for $GAME_VERSION and loader $MOD_LOADER already exists → skipping"
            echo "PUBLISH=false" >> $GITHUB_ENV
          else
            echo "Version $FULL_VERSION for $GAME_VERSION and loader $MOD_LOADER not found → will publish"
            echo "PUBLISH=true" >> $GITHUB_ENV
          fi

      - name: Read changelog section
        if: env.PUBLISH == 'true'
        run: |
          if [ -f changelog.md ]; then
            {
              echo "CHANGELOG<<EOF"
              awk '/^## 📦 Version /{if(!f){f=1;next}} f{print}' changelog.md | sed '/^## 📦/,$d'
              echo "EOF"
            } >> $GITHUB_ENV
          else
            echo "CHANGELOG=No changelog provided" >> $GITHUB_ENV
          fi

      - name: Fetch Modrinth project name
        if: env.PUBLISH == 'true'
        run: |
          # Достаём название проекта через API Modrinth
          MOD_NAME=$(curl -s -H "Authorization: $MODRINTH_TOKEN" \
            "https://api.modrinth.com/v2/project/$MODRINTH_PROJECT_ID" \
            | jq -r '.title')

          if [ -z "$MOD_NAME" ] || [ "$MOD_NAME" = "null" ]; then
            echo "Failed to fetch project name"
            exit 1
          fi

          echo "MOD_NAME=$MOD_NAME" >> $GITHUB_ENV

      - name: Publish to Modrinth
        if: env.PUBLISH == 'true'
        run: |
          if [ -z "$FULL_VERSION" ]; then
            echo "FULL_VERSION is empty!"
            exit 1
          fi

          if [ ! -f "$JAR_FILE" ]; then
            echo "JAR file not found: $JAR_FILE"
            exit 1
          fi
          
          ls -lh "$JAR_FILE"

          echo "Publishing $FULL_VERSION → $RELEASE_TYPE"

          # Формируем JSON и сразу сохраняем в файл
          TMP_JSON=$(mktemp /tmp/modrinth_data.XXXXXX.json)
          jq -nc \
            --arg project_id "$MODRINTH_PROJECT_ID" \
            --arg version_number "$FULL_VERSION" \
            --arg version_type "$RELEASE_TYPE" \
            --arg game_version "$GAME_VERSION" \
            --arg changelog "$CHANGELOG" \
            --arg modloader "$MOD_LOADER" \
            --arg name "$MOD_NAME $FULL_VERSION" \
            '{
              name: $name,
              project_id: $project_id,
              version_number: $version_number,
              version_type: $version_type,
              game_versions: [$game_version],
              loaders: [$modloader],
              changelog: $changelog,
              file_parts: ["file"],
              "featured": false,
              "dependencies": []
            }' > "$TMP_JSON"

          echo "=== METADATA preview ==="
          jq . "$TMP_JSON"   # красиво форматируем, чтобы было видно все спецсимволы
          echo "========================"


          echo "Published version id: $VERSION_ID"
          rm -f "$TMP_JSON"
